<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Matt Lilly's Poster Cropper</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Berkshire+Swash&display=swap" rel="stylesheet">
    <!-- Cropper.js CSS for the cropping interface -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" />
    <style>
        body {
            background-color: #000000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #e2e8f0;
            touch-action: pan-y; /* Optimize touch for tablet scrolling outside the canvas */
        }
        .dead-font {
            font-family: 'Berkshire Swash', cursive;
        }
        /* Style for active edge selection button */
        .edge-btn.active {
            background-color: #3b82f6; /* blue-500 */
            color: white;
            border-color: #2563eb; /* blue-600 */
        }
    </style>
</head>
<body class="min-h-screen text-gray-800 flex flex-col items-center py-2 px-2 sm:px-4 sm:py-4 lg:px-8">

    <div id="app-container" class="max-w-5xl w-full bg-white rounded-2xl shadow-[0_0_40px_rgba(255,255,255,0.1)] overflow-hidden border-2 border-gray-700 flex flex-col mb-8 bg-gray-50">
        
        <!-- Header (Compact for Tablet) -->
        <div id="app-header" class="bg-black px-4 py-3 sm:py-5 text-center border-b-4 border-yellow-400 shrink-0">
            <h1 class="dead-font text-2xl sm:text-4xl font-extrabold text-white mb-1 drop-shadow-[0_2px_2px_rgba(0,0,0,0.8)] tracking-wider">Matt Lilly's Poster Cropper</h1>
            <p class="text-gray-300 text-xs sm:text-sm font-medium drop-shadow-sm max-w-2xl mx-auto">
                Upload your gig posters to automatically trim the white edges. Pinch to zoom, and use the controls to fine-tune.
            </p>
        </div>

        <div class="p-3 sm:p-5 bg-gray-50 text-gray-800 flex flex-col gap-3">
            
            <!-- Upload Area (Visible initially) -->
            <div id="upload-area" class="border-4 border-dashed border-red-300 rounded-xl p-8 sm:p-12 text-center hover:border-blue-500 hover:bg-blue-50 transition-colors cursor-pointer flex flex-col items-center justify-center min-h-[300px]">
                <svg class="w-16 h-16 text-blue-500 mb-4 drop-shadow-sm" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
                </svg>
                <h3 class="text-xl font-medium text-gray-900 mb-1">Tap to upload poster</h3>
                <p class="text-gray-500 text-sm">Supports JPG, PNG, WEBP</p>
                <input type="file" id="file-input" class="hidden" accept="image/png, image/jpeg, image/webp" />
            </div>

            <!-- Workspace Area (Hidden initially) -->
            <div id="workspace-area" class="hidden flex-col gap-4">
                
                <!-- Compact Top Toolbar -->
                <div class="flex flex-wrap items-center justify-center sm:justify-between gap-2 bg-gray-200 p-2 rounded-lg border border-gray-300 shadow-inner shrink-0">
                    <div class="flex gap-2">
                        <button id="btn-auto-crop" class="px-3 py-2 bg-blue-600 border border-transparent rounded text-sm font-bold text-white hover:bg-blue-700 shadow-sm active:scale-95 transition-transform touch-manipulation">
                            Auto Crop
                        </button>
                        <button id="btn-reset" class="px-3 py-2 bg-red-600 border border-transparent rounded text-sm font-bold text-white hover:bg-red-700 shadow-sm active:scale-95 transition-transform touch-manipulation">
                            Reset
                        </button>
                    </div>
                    
                    <div class="flex gap-2">
                        <div class="flex gap-1 bg-white p-1 rounded border border-gray-300">
                            <button id="btn-rotate-left" class="p-1.5 text-gray-700 hover:bg-gray-100 rounded active:bg-gray-200 touch-manipulation" title="Rotate Left 1°">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"></path></svg>
                            </button>
                            <div class="w-px bg-gray-300"></div>
                            <button id="btn-rotate-right" class="p-1.5 text-gray-700 hover:bg-gray-100 rounded active:bg-gray-200 touch-manipulation" title="Rotate Right 1°">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 10h-10a8 8 0 00-8 8v2M21 10l-6 6m6-6l-6-6"></path></svg>
                            </button>
                        </div>
                        <button id="btn-new-image" class="px-3 py-2 bg-yellow-500 border border-transparent rounded text-sm font-bold text-gray-900 hover:bg-yellow-600 shadow-sm active:scale-95 transition-transform touch-manipulation">
                            New Image
                        </button>
                    </div>
                </div>

                <!-- Compact Nudge Panel -->
                <div class="bg-gray-100 p-2 sm:p-3 rounded-lg border border-gray-300 shadow-sm flex flex-col sm:flex-row items-center justify-center gap-4 shrink-0">
                    
                    <!-- Select Edge -->
                    <div class="flex flex-col items-center sm:items-start w-full sm:w-auto">
                        <h3 class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">1. Select Edge</h3>
                        <div class="flex gap-1 w-full sm:w-auto justify-center">
                            <button class="edge-btn active flex-1 sm:flex-none px-3 py-2 bg-white border border-gray-300 rounded text-sm font-medium touch-manipulation" data-edge="top">Top</button>
                            <button class="edge-btn flex-1 sm:flex-none px-3 py-2 bg-white border border-gray-300 rounded text-sm font-medium touch-manipulation" data-edge="bottom">Bottom</button>
                            <button class="edge-btn flex-1 sm:flex-none px-3 py-2 bg-white border border-gray-300 rounded text-sm font-medium touch-manipulation" data-edge="left">Left</button>
                            <button class="edge-btn flex-1 sm:flex-none px-3 py-2 bg-white border border-gray-300 rounded text-sm font-medium touch-manipulation" data-edge="right">Right</button>
                        </div>
                    </div>

                    <div class="hidden sm:block w-px h-12 bg-gray-300 mx-2"></div>

                    <!-- 1px Nudge D-Pad -->
                    <div class="flex flex-col items-center">
                        <h3 class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">2. Nudge 1px</h3>
                        <div class="grid grid-cols-3 gap-1 w-[120px] h-[100px]">
                            <div></div>
                            <button id="nudge-up" class="bg-gray-800 text-white rounded-md flex items-center justify-center hover:bg-gray-700 active:bg-blue-600 touch-manipulation shadow-md disabled:opacity-30 disabled:bg-gray-400">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 15l7-7 7 7"></path></svg>
                            </button>
                            <div></div>
                            
                            <button id="nudge-left" class="bg-gray-800 text-white rounded-md flex items-center justify-center hover:bg-gray-700 active:bg-blue-600 touch-manipulation shadow-md disabled:opacity-30 disabled:bg-gray-400">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7"></path></svg>
                            </button>
                            <div class="bg-gray-200 rounded-md flex items-center justify-center text-[10px] font-bold text-gray-500 border border-gray-300">1px</div>
                            <button id="nudge-right" class="bg-gray-800 text-white rounded-md flex items-center justify-center hover:bg-gray-700 active:bg-blue-600 touch-manipulation shadow-md disabled:opacity-30 disabled:bg-gray-400">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7"></path></svg>
                            </button>
                            
                            <div></div>
                            <button id="nudge-down" class="bg-gray-800 text-white rounded-md flex items-center justify-center hover:bg-gray-700 active:bg-blue-600 touch-manipulation shadow-md disabled:opacity-30 disabled:bg-gray-400">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"></path></svg>
                            </button>
                            <div></div>
                        </div>
                    </div>

                </div>

                <!-- Custom Touch/Pan/Zoom Workspace Container -->
                <div id="touch-receiver" class="w-full h-[50vh] sm:h-[60vh] bg-[#e5e7eb] rounded-lg overflow-hidden border-2 border-gray-400 shadow-inner relative cursor-move" style="touch-action: none; user-select: none;">
                    
                    <!-- Hardware Accelerated Zoom Layer -->
                    <div id="zoom-layer" class="w-full h-full block" style="transform-origin: 0 0; transform: translate(0px, 0px) scale(1); will-change: transform;">
                        <img id="image" src="" alt="Picture to crop" class="block max-w-full max-h-full mx-auto" draggable="false">
                    </div>

                    <!-- Floating Controls (Bottom Right Overlay) -->
                    <div class="absolute bottom-3 right-3 flex flex-col gap-2 z-10">
                        <button id="btn-zoom-in" class="w-10 h-10 bg-white/90 backdrop-blur border border-gray-300 rounded-full text-gray-800 flex items-center justify-center shadow-lg active:bg-gray-200 touch-manipulation">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                        </button>
                        <button id="btn-zoom-out" class="w-10 h-10 bg-white/90 backdrop-blur border border-gray-300 rounded-full text-gray-800 flex items-center justify-center shadow-lg active:bg-gray-200 touch-manipulation">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H4"></path></svg>
                        </button>
                    </div>
                </div>

                <p class="text-center text-xs text-gray-500 sm:hidden">💡 Use the edges outside the image to scroll down</p>

                <!-- Download Action -->
                <div class="flex justify-center shrink-0">
                    <button id="btn-download" class="flex items-center gap-2 px-6 py-3 sm:px-8 sm:py-4 bg-black border border-transparent rounded-full shadow-lg text-lg font-bold text-white hover:scale-105 active:scale-95 transform focus:outline-none transition-all w-full sm:w-auto justify-center touch-manipulation">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                        </svg>
                        Download Cropped Poster
                    </button>
                </div>
            </div>

        </div>
    </div>

    <!-- Cropper.js Logic -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script>
        // DOM Elements
        const appContainer = document.getElementById('app-container');
        const appHeader = document.getElementById('app-header');
        const uploadArea = document.getElementById('upload-area');
        const fileInput = document.getElementById('file-input');
        const workspaceArea = document.getElementById('workspace-area');
        const imageElement = document.getElementById('image');
        
        const touchReceiver = document.getElementById('touch-receiver');
        const zoomLayer = document.getElementById('zoom-layer');
        
        // Buttons
        const btnAutoCrop = document.getElementById('btn-auto-crop');
        const btnReset = document.getElementById('btn-reset');
        const btnZoomIn = document.getElementById('btn-zoom-in');
        const btnZoomOut = document.getElementById('btn-zoom-out');
        const btnRotateLeft = document.getElementById('btn-rotate-left');
        const btnRotateRight = document.getElementById('btn-rotate-right');
        const btnDownload = document.getElementById('btn-download');
        const btnNewImage = document.getElementById('btn-new-image');
        
        // Nudge / Fine-tune Elements
        const edgeBtns = document.querySelectorAll('.edge-btn');
        const nudgeUp = document.getElementById('nudge-up');
        const nudgeDown = document.getElementById('nudge-down');
        const nudgeLeft = document.getElementById('nudge-left');
        const nudgeRight = document.getElementById('nudge-right');

        let cropper = null;
        let activeEdge = 'top'; 
        let currentFile = { name: 'image.jpg', type: 'image/jpeg' };

        // --- Custom Pan & Zoom Logic (Separated from Cropper to guarantee 'glue') ---
        let scale = 1, panX = 0, panY = 0;
        let activePointers = new Map();
        let initialPinchDistance = -1, initialPinchScale = 1;
        let initialPinchPanX = 0, initialPinchPanY = 0;
        let pinchCenterX = 0, pinchCenterY = 0;

        function applyTransform() {
            zoomLayer.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
        }
        
        function resetView() {
            scale = 1; panX = 0; panY = 0; applyTransform();
        }

        function zoomBy(factor) {
            const rect = touchReceiver.getBoundingClientRect();
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            const newScale = Math.max(0.2, Math.min(scale * factor, 15));
            panX = centerX - (centerX - panX) * (newScale / scale);
            panY = centerY - (centerY - panY) * (newScale / scale);
            scale = newScale;
            applyTransform();
        }

        // Mouse Wheel Zoom
        touchReceiver.addEventListener('wheel', (e) => {
            e.preventDefault();
            const zoomDelta = e.deltaY > 0 ? 0.9 : 1.1;
            const rect = touchReceiver.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            const newScale = Math.max(0.2, Math.min(scale * zoomDelta, 15));
            panX = mouseX - (mouseX - panX) * (newScale / scale);
            panY = mouseY - (mouseY - panY) * (newScale / scale);
            scale = newScale;
            applyTransform();
        }, { passive: false });

        // Touch Pan & Pinch Zoom
        touchReceiver.addEventListener('pointerdown', (e) => {
            if (e.target.closest('.cropper-point') || e.target.closest('.cropper-line') || e.target.closest('button')) {
                return;
            }
            e.preventDefault();
            activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
            touchReceiver.setPointerCapture(e.pointerId); 
        });

        touchReceiver.addEventListener('pointermove', (e) => {
            if (!activePointers.has(e.pointerId)) return;
            e.preventDefault();

            const prevPointer = activePointers.get(e.pointerId);
            const deltaX = e.clientX - prevPointer.x;
            const deltaY = e.clientY - prevPointer.y;
            activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

            if (activePointers.size === 1) {
                panX += deltaX;
                panY += deltaY;
                applyTransform();
            } else if (activePointers.size === 2) {
                const pts = Array.from(activePointers.values());
                const currentDist = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);

                if (initialPinchDistance < 0) {
                    initialPinchDistance = currentDist;
                    initialPinchScale = scale;
                    const rect = touchReceiver.getBoundingClientRect();
                    pinchCenterX = ((pts[0].x + pts[1].x) / 2) - rect.left;
                    pinchCenterY = ((pts[0].y + pts[1].y) / 2) - rect.top;
                    initialPinchPanX = panX;
                    initialPinchPanY = panY;
                } else {
                    const zoomDelta = currentDist / initialPinchDistance;
                    const newScale = Math.max(0.2, Math.min(initialPinchScale * zoomDelta, 15));
                    panX = pinchCenterX - (pinchCenterX - initialPinchPanX) * (newScale / initialPinchScale);
                    panY = pinchCenterY - (pinchCenterY - initialPinchPanY) * (newScale / initialPinchScale);
                    scale = newScale;
                    applyTransform();
                }
            }
        });

        const pointerEnd = (e) => {
            if (activePointers.has(e.pointerId)) activePointers.delete(e.pointerId);
            if (activePointers.size < 2) initialPinchDistance = -1;
        };

        touchReceiver.addEventListener('pointerup', pointerEnd);
        touchReceiver.addEventListener('pointercancel', pointerEnd);
        window.addEventListener('pointerup', pointerEnd);


        // --- Event Listeners for Upload ---
        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.classList.add('border-blue-500', 'bg-blue-50'); });
        uploadArea.addEventListener('dragleave', () => { uploadArea.classList.remove('border-blue-500', 'bg-blue-50'); });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('border-blue-500', 'bg-blue-50');
            if (e.dataTransfer.files && e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', (e) => {
            if (e.target.files && e.target.files.length > 0) handleFile(e.target.files[0]);
        });

        // --- Core Application Logic ---
        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                alert('Please upload an image file.');
                return;
            }
            currentFile.name = file.name;
            currentFile.type = file.type;

            const reader = new FileReader();
            reader.onload = (e) => {
                uploadArea.classList.add('hidden');
                workspaceArea.classList.remove('hidden');
                workspaceArea.classList.add('flex');
                
                resetView(); // Reset custom view transform before drawing
                imageElement.src = e.target.result;

                if (cropper) cropper.destroy();

                imageElement.onload = () => { initCropper(); };
            };
            reader.readAsDataURL(file);
        }

        function initCropper() {
            cropper = new Cropper(imageElement, {
                viewMode: 1, 
                dragMode: 'none', 
                autoCrop: true, 
                responsive: true,
                restore: true,
                guides: true,
                center: true,
                highlight: false,
                cropBoxMovable: false, 
                cropBoxResizable: true, 
                toggleDragModeOnDblclick: false,
                zoomable: false,      
                zoomOnWheel: false,   
                zoomOnTouch: false,   
                movable: false,       
                rotatable: true,      
                scalable: false,      
                ready: function () {
                    setTimeout(() => {
                        performAutoCrop();
                        updateNudgeControls();
                    }, 100);
                }
            });
        }

        // --- Auto Crop Logic ---
        function performAutoCrop() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            canvas.width = imageElement.naturalWidth;
            canvas.height = imageElement.naturalHeight;
            ctx.drawImage(imageElement, 0, 0);

            try {
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;

                const contentThreshold = 215; 
                function isContent(r, g, b, a) { return a > 10 && (r < contentThreshold || g < contentThreshold || b < contentThreshold); }

                let top = 0, bottom = canvas.height - 1, left = 0, right = canvas.width - 1;
                const rowNoiseLimit = Math.max(5, Math.floor(canvas.width * 0.02));
                const colNoiseLimit = Math.max(5, Math.floor(canvas.height * 0.02));

                for (let y = 0; y < canvas.height; y++) {
                    let contentPixels = 0;
                    for (let x = 0; x < canvas.width; x++) {
                        const i = (y * canvas.width + x) * 4;
                        if (isContent(data[i], data[i+1], data[i+2], data[i+3])) contentPixels++;
                    }
                    if (contentPixels > rowNoiseLimit) { top = y; break; }
                }
                for (let y = canvas.height - 1; y >= 0; y--) {
                    let contentPixels = 0;
                    for (let x = 0; x < canvas.width; x++) {
                        const i = (y * canvas.width + x) * 4;
                        if (isContent(data[i], data[i+1], data[i+2], data[i+3])) contentPixels++;
                    }
                    if (contentPixels > rowNoiseLimit) { bottom = y; break; }
                }
                for (let x = 0; x < canvas.width; x++) {
                    let contentPixels = 0;
                    for (let y = top; y <= bottom; y++) {
                        const i = (y * canvas.width + x) * 4;
                        if (isContent(data[i], data[i+1], data[i+2], data[i+3])) contentPixels++;
                    }
                    if (contentPixels > colNoiseLimit) { left = x; break; }
                }
                for (let x = canvas.width - 1; x >= 0; x--) {
                    let contentPixels = 0;
                    for (let y = top; y <= bottom; y++) {
                        const i = (y * canvas.width + x) * 4;
                        if (isContent(data[i], data[i+1], data[i+2], data[i+3])) contentPixels++;
                    }
                    if (contentPixels > colNoiseLimit) { right = x; break; }
                }

                if (top < bottom && left < right) {
                    const maxPushX = Math.floor(canvas.width * 0.15); 
                    const maxPushY = Math.floor(canvas.height * 0.15);
                    const whiteThreshold = 200; 
                    function isWhitePixel(r, g, b, a) {
                        if (a < 10) return true; 
                        return r > whiteThreshold && g > whiteThreshold && b > whiteThreshold;
                    }

                    let leftLimit = Math.min(left + maxPushX, right - 1);
                    while (left < leftLimit) {
                        let whiteCount = 0;
                        for (let y = top; y <= bottom; y++) {
                            const i = (y * canvas.width + left) * 4;
                            if (isWhitePixel(data[i], data[i+1], data[i+2], data[i+3])) whiteCount++;
                        }
                        if (whiteCount < (bottom - top) * 0.015) break; 
                        left++;
                    }

                    let rightLimit = Math.max(right - maxPushX, left + 1);
                    while (right > rightLimit) {
                        let whiteCount = 0;
                        for (let y = top; y <= bottom; y++) {
                            const i = (y * canvas.width + right) * 4;
                            if (isWhitePixel(data[i], data[i+1], data[i+2], data[i+3])) whiteCount++;
                        }
                        if (whiteCount < (bottom - top) * 0.015) break;
                        right--;
                    }

                    let topLimit = Math.min(top + maxPushY, bottom - 1);
                    while (top < topLimit) {
                        let whiteCount = 0;
                        for (let x = left; x <= right; x++) {
                            const i = (top * canvas.width + x) * 4;
                            if (isWhitePixel(data[i], data[i+1], data[i+2], data[i+3])) whiteCount++;
                        }
                        if (whiteCount < (right - left) * 0.015) break;
                        top++;
                    }

                    let bottomLimit = Math.max(bottom - maxPushY, top + 1);
                    while (bottom > bottomLimit) {
                        let whiteCount = 0;
                        for (let x = left; x <= right; x++) {
                            const i = (bottom * canvas.width + x) * 4;
                            if (isWhitePixel(data[i], data[i+1], data[i+2], data[i+3])) whiteCount++;
                        }
                        if (whiteCount < (right - left) * 0.015) break;
                        bottom--;
                    }

                    left = Math.min(left + 1, right);
                    top = Math.min(top + 1, bottom);
                    right = Math.max(right - 1, left);
                    bottom = Math.max(bottom - 1, top);
                } else {
                    left = 0; top = 0; right = canvas.width; bottom = canvas.height;
                }

                if (cropper) {
                    cropper.setData({ x: left, y: top, width: (right - left) + 1, height: (bottom - top) + 1 });
                }
            } catch (error) {
                console.error("Error analyzing image data:", error);
            }
        }

        // --- Fine Tune / Nudge Logic ---
        
        edgeBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                edgeBtns.forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                activeEdge = e.target.dataset.edge;
                updateNudgeControls();
            });
        });

        function updateNudgeControls() {
            if (activeEdge === 'top' || activeEdge === 'bottom') {
                nudgeLeft.disabled = true;
                nudgeRight.disabled = true;
                nudgeUp.disabled = false;
                nudgeDown.disabled = false;
            } else {
                nudgeUp.disabled = true;
                nudgeDown.disabled = true;
                nudgeLeft.disabled = false;
                nudgeRight.disabled = false;
            }
        }

        function nudge(direction) {
            if (!cropper) return;
            const data = cropper.getData(); 
            
            switch(activeEdge) {
                case 'top':
                    if (direction === 'up') { data.y -= 1; data.height += 1; }
                    if (direction === 'down') { data.y += 1; data.height -= 1; }
                    break;
                case 'bottom':
                    if (direction === 'up') { data.height -= 1; }
                    if (direction === 'down') { data.height += 1; }
                    break;
                case 'left':
                    if (direction === 'left') { data.x -= 1; data.width += 1; }
                    if (direction === 'right') { data.x += 1; data.width -= 1; }
                    break;
                case 'right':
                    if (direction === 'left') { data.width -= 1; }
                    if (direction === 'right') { data.width += 1; }
                    break;
            }
            cropper.setData(data);
        }

        nudgeUp.addEventListener('click', () => nudge('up'));
        nudgeDown.addEventListener('click', () => nudge('down'));
        nudgeLeft.addEventListener('click', () => nudge('left'));
        nudgeRight.addEventListener('click', () => nudge('right'));

        // --- Standard Button Actions ---

        btnAutoCrop.addEventListener('click', () => { if (cropper) performAutoCrop(); });
        
        btnReset.addEventListener('click', () => {
            if (cropper) {
                const imageData = cropper.getImageData();
                cropper.setData({ x: 0, y: 0, width: imageData.naturalWidth, height: imageData.naturalHeight });
            }
        });

        btnZoomIn.addEventListener('click', () => zoomBy(1.2));
        btnZoomOut.addEventListener('click', () => zoomBy(0.8));
        
        btnRotateLeft.addEventListener('click', () => { if (cropper) cropper.rotate(-1); });
        btnRotateRight.addEventListener('click', () => { if (cropper) cropper.rotate(1); });

        btnNewImage.addEventListener('click', () => {
            workspaceArea.classList.add('hidden');
            workspaceArea.classList.remove('flex');
            uploadArea.classList.remove('hidden');
            fileInput.value = '';
            if (cropper) { cropper.destroy(); cropper = null; }
        });

        btnDownload.addEventListener('click', () => {
            if (!cropper) return;
            const croppedCanvas = cropper.getCroppedCanvas({
                imageSmoothingEnabled: true,
                imageSmoothingQuality: 'high',
            });
            if (!croppedCanvas) return;

            croppedCanvas.toBlob((blob) => {
                if (!blob) return alert('Error creating image file.');
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                
                const originalNameWithoutExt = currentFile.name.substring(0, currentFile.name.lastIndexOf('.')) || currentFile.name;
                const extension = currentFile.name.substring(currentFile.name.lastIndexOf('.')) || '.jpg';
                a.download = `${originalNameWithoutExt}-cropped${extension}`;
                
                a.href = url;
                document.body.appendChild(a);
                a.click();
                setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
            }, currentFile.type, 1.0); 
        });

    </script>
</body>
</html>
